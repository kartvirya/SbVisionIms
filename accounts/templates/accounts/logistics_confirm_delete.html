{% extends 'store/base.html' %}
{% load static %}

{% block content %}
<div class="container px-5 py-4">
    <div class="card shadow-sm">
        <div class="card-header bg-danger text-white">
            <h3 class="mb-0">Confirm Delete</h3>
        </div>
        <div class="card-body">
            <p class="lead">Are you sure you want to delete "<strong>{{ object.name }}</strong>"?</p>
            <p class="text-muted">This action cannot be undone. All packages using this logistics company will have their logistics field set to null.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash-alt"></i> Confirm Delete
                    </button>
                    <a href="{% url 'logistics-list' %}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
