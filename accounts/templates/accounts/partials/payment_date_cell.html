<div class="nepali-datetime-wrap nepali-datetime-wrap--compact" data-hidden="payment-date-{{ payment.id }}" data-default-cal="bs">
    <div class="btn-group btn-group-sm mb-1 nepali-cal-toggle" role="group">
        <button type="button" class="btn btn-outline-secondary btn-sm py-0 px-2 active" data-cal="bs">B.S.</button>
        <button type="button" class="btn btn-outline-secondary btn-sm py-0 px-2" data-cal="ad">A.D.</button>
    </div>
    <div class="nepali-mode-bs">
        <input type="text" id="payment-date-{{ payment.id }}_bs" class="form-control nepali-bs-date" placeholder="YYYY-MM-DD" autocomplete="off" inputmode="numeric">
    </div>
    <div class="nepali-mode-ad d-none">
        <input type="text" id="payment-date-{{ payment.id }}_ad" class="form-control form-control-sm nepali-ad-date" placeholder="YYYY-MM-DD" autocomplete="off" inputmode="numeric">
    </div>
    <small class="text-muted nepali-ad-hint d-block"></small>
</div>
<input type="hidden" name="transaction_date" form="payment-form-{{ payment.id }}" id="payment-date-{{ payment.id }}" value="{% if party_type == 'customer' %}{% if payment.received_at %}{{ payment.received_at|date:'Y-m-d' }}T12:00{% endif %}{% else %}{% if payment.paid_at %}{{ payment.paid_at|date:'Y-m-d' }}T12:00{% endif %}{% endif %}">
