<div class="nepali-datetime-wrap nepali-datetime-wrap--compact" data-hidden="{{ field_id }}" data-default-cal="bs">
    <div class="btn-group btn-group-sm mb-1 nepali-cal-toggle" role="group">
        <button type="button" class="btn btn-outline-secondary btn-sm py-0 px-2 active" data-cal="bs">B.S.</button>
        <button type="button" class="btn btn-outline-secondary btn-sm py-0 px-2" data-cal="ad">A.D.</button>
    </div>
    <div class="nepali-mode-bs">
        <input type="text" id="{{ field_id }}_bs" class="form-control nepali-bs-date" placeholder="YYYY-MM-DD" autocomplete="off" inputmode="numeric">
    </div>
    <div class="nepali-mode-ad d-none">
        <input type="date" id="{{ field_id }}_ad" class="form-control form-control-sm nepali-ad-date">
    </div>
    <small class="text-muted nepali-ad-hint d-block"></small>
</div>
<input type="hidden" name="{{ field_name }}" id="{{ field_id }}" value="{{ field_value }}">
