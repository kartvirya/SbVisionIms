{% if row.can_edit_amount or row.can_delete or row.edit_url %}
<div class="d-flex flex-wrap gap-1 justify-content-end align-items-start">
    {% if row.can_edit_amount %}
    <div class="text-end" style="min-width:11rem;">
        <input
            type="number"
            name="amount"
            form="ledger-amount-form-{{ row.row_kind }}-{{ row.row_pk }}"
            class="form-control form-control-sm text-end mb-1"
            step="0.01"
            min="0"
            value="{{ row.amount }}"
            title="Amount (Rs)"
        >
        <select
            name="amount_side"
            form="ledger-amount-form-{{ row.row_kind }}-{{ row.row_pk }}"
            class="form-select form-select-sm"
            title="Debit or credit"
        >
            <option value="debit" {% if row.amount_side == "debit" %}selected{% endif %}>Debit (Dr)</option>
            <option value="credit" {% if row.amount_side == "credit" %}selected{% endif %}>Credit (Cr)</option>
        </select>
    </div>
    <button type="submit" form="ledger-amount-form-{{ row.row_kind }}-{{ row.row_pk }}" class="btn btn-primary btn-sm py-0">Save</button>
    {% endif %}
    {% if row.edit_url %}
    <a href="{{ row.edit_url }}{% if return_query %}?{{ return_query }}{% endif %}" class="btn btn-outline-secondary btn-sm py-0" title="Open full bill">Bill</a>
    {% endif %}
    {% if row.can_delete %}
    <button
        type="submit"
        form="ledger-delete-form-{{ row.row_kind }}-{{ row.row_pk }}"
        class="btn btn-outline-danger btn-sm py-0"
        onclick="return confirm('Delete this transaction from the account book?');"
    >Delete</button>
    {% endif %}
</div>
{% else %}—{% endif %}
