{% load static %}
<script src="https://cdn.jsdelivr.net/npm/nepali-date-converter@3.4.0/dist/nepali-date-converter.umd.js"></script>
<script src="{% static 'js/nepali_datetime.js' %}"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    if (!window.ImsNepaliDatetime) return;
    ImsNepaliDatetime.initAll();
    document.querySelectorAll("form").forEach(function (form) {
        form.addEventListener("submit", function () {
            ImsNepaliDatetime.syncForm(form);
        });
    });
});
</script>
