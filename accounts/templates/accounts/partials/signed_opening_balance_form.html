<form method="post" class="js-sync-datetime-form" onsubmit="if(window.ImsNepaliDatetime){ImsNepaliDatetime.syncForm(this);}">
    {% csrf_token %}
    <input type="hidden" name="action" value="opening_balance">
    <div class="mb-2">{% include "store/partials/nepali_datetime_field.html" with field=form.opening_balance_date %}</div>
    <div class="mb-2">
        <label class="form-label small mb-1">{{ form.opening_sign.label }}</label>
        {{ form.opening_sign }}
    </div>
    <div class="mb-2">
        <label class="form-label small mb-1">{{ form.opening_amount.label }}</label>
        {{ form.opening_amount }}
    </div>
    {% if help_text %}<p class="text-muted small mb-2">{{ help_text }}</p>{% endif %}
    <button type="submit" class="btn btn-primary btn-sm">Save</button>
</form>
