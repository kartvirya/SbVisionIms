<label class="form-label" for="{{ field.id_for_label }}_bs">{{ field.label }}</label>
<div class="nepali-datetime-wrap" data-hidden="{{ field.id_for_label }}" data-default-cal="bs">
    <div class="btn-group btn-group-sm mb-2 nepali-cal-toggle" role="group" aria-label="Calendar type">
        <button type="button" class="btn btn-outline-secondary active" data-cal="bs">B.S.</button>
        <button type="button" class="btn btn-outline-secondary" data-cal="ad">A.D.</button>
    </div>
    <div class="nepali-mode-bs">
        <input
            type="text"
            id="{{ field.id_for_label }}_bs"
            class="form-control nepali-bs-date"
            placeholder="YYYY-MM-DD (BS)"
            autocomplete="off"
            inputmode="numeric"
        >
    </div>
    <div class="nepali-mode-ad d-none">
        <input
            type="date"
            id="{{ field.id_for_label }}_ad"
            class="form-control nepali-ad-date"
        >
    </div>
    <small class="text-muted nepali-ad-hint d-block mt-1"></small>
</div>
<div class="d-none">{{ field }}</div>
