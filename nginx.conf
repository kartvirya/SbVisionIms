# Nginx configuration for Django Inventory Management System
# Place this file at: /etc/nginx/sites-available/inventory_ms

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    
    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;

    # Maximum upload size
    client_max_body_size 100M;

    # Static files
    location /static/ {
        alias /var/www/inventory_ms/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /var/www/inventory_ms/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Django application
    location / {
        include proxy_params;
        proxy_pass http://unix:/var/www/inventory_ms/inventory_ms.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

